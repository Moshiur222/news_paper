<header class="header">
    <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search here...">
        </div>
    </div>
    
    <div class="header-right">
        <!-- Theme Switcher -->
        <div class="theme-switcher">
            <button class="theme-btn" id="themeToggle">
                <i class="fas fa-palette"></i>
            </button>
            <div class="theme-dropdown">
                <div class="theme-dropdown-header">
                    <h4>Choose Theme</h4>
                </div>
                <div class="theme-options">
                    <button class="theme-option active" data-theme="light" title="Light Mode">
                        <span class="theme-color light"></span>
                        <span class="theme-name">Light</span>
                    </button>
                    <button class="theme-option" data-theme="dark" title="Dark Mode">
                        <span class="theme-color dark"></span>
                        <span class="theme-name">Dark</span>
                    </button>
                    <button class="theme-option" data-theme="blue" title="Blue Mode">
                        <span class="theme-color blue"></span>
                        <span class="theme-name">Blue</span>
                    </button>
                    <button class="theme-option" data-theme="green" title="Green Mode">
                        <span class="theme-color green"></span>
                        <span class="theme-name">Green</span>
                    </button>
                    <button class="theme-option" data-theme="purple" title="Purple Mode">
                        <span class="theme-color purple"></span>
                        <span class="theme-name">Purple</span>
                    </button>
                    <button class="theme-option" data-theme="red" title="Red Mode">
                        <span class="theme-color red"></span>
                        <span class="theme-name">Red</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="header-user">
            <div class="user-info">
                <span class="user-name">Admin</span>
                <span class="user-role">Administrator</span>
            </div>
            <div class="user-avatar">
                <img src="https://ui-avatars.com/api/?name=John+Doe&background=6366f1&color=fff&size=40" alt="User">
            </div>
            <div class="user-dropdown">
                <a href="#"><i class="fas fa-user"></i> Profile</a>
                <a href="#"><i class="fas fa-cog"></i> Settings</a>
                <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>
</header>
