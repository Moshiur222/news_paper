{% load static %}
<style>
    .menu-item.active > .menu-link {
    background: #2563eb;
    color: #fff;
    border-radius: 8px;
}

.menu-item.active i {
    color: #fff;
}

.menu-item.has-submenu.open .submenu {
    display: block;
}

.submenu {
    display: none;
}

.submenu li.active a {
    color: #0019f8;
    font-weight: 600;
}
</style>
<aside class="sidebar" id="sidebar">

    <a href="{% url 'dashboard' %}">
        <div class="sidebar-brand">
            <img src="{% static 'news/landing/images/logo.png' %}" class="logo-img">
        </div>
    </a>

    <nav class="sidebar-menu">
        <ul class="menu-list">

            <!-- Dashboard -->
            <li class="menu-item {% if active_url == 'dashboard' %}active{% endif %}">
                <a href="{% url 'dashboard' %}" class="menu-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <!-- Home -->
            <li class="menu-item has-submenu {% if active_url == 'admin_location_list' or active_url == 'news' or active_url == 'category' or active_url == 'trending' %}active open {% endif %}">

                <a href="#" class="menu-link">
                    <i class="fas fa-folder"></i>
                    <span>Home</span>
                    <i class="fas fa-chevron-right submenu-arrow"></i>
                </a>

                <ul class="submenu">
                    <li class="{% if active_url == 'admin_location_list' %}active{% endif %}">
                        <a href="{% url 'admin_location_list' %}">Location</a>
                    </li>
                    <li class="{% if active_url == 'category' %}active{% endif %}">
                        <a href="{% url 'category' %}">Category</a>
                    </li>
                    <li class="{% if active_url == 'news' %}active{% endif %}">
                        <a href="{% url 'news' %}">Add News</a>
                    </li>
                    <li class="{% if active_url == 'trending' %}active{% endif %}">
                        <a href="{% url 'trending' %}">trending News</a>
                    </li>
                    <li class="{% if active_url == 'company_info' %}active{% endif %}">
                        <a href="{% url 'company_info' %}">Company Information </a>
                    </li>
                    <li class="{% if active_url == 'subscriber' %}active{% endif %}">
                        <a href="{% url 'subscriber' %}">Subscribers </a>
                    </li>
                </ul>
            </li>
        </ul>
    </nav>
</aside>
