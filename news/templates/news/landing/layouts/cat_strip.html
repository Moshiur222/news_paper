{% load i18n %}

<style>
.cat-strip {
  background: #fff;
  border-bottom: 1px solid #e9ecef;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  position: relative;
  z-index: 99;
}

.category-scroll {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  scrollbar-width: thin;
}

.cat-item {
  flex: 0 0 auto;
  background: #f8fafc;
  border-radius: 40px;
  padding: 0.4rem 1.1rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: #1e293b;
  text-decoration: none;
  white-space: nowrap;
  border: 1px solid #e2e8f0;
}

.cat-item i {
  margin-right: 6px;
  color: var(--primary-red);
}

.cat-item:hover {
  background: var(--primary-red);
  color: #fff;
}
.cat-item:hover i {
  color: #fff;
}
</style>

<div class="cat-strip">
  <div class="container-xl px-0 px-md-3">

    <div class="category-scroll">

      <!-- LOCATION (AUTO TRANSLATE) -->
      {% for location in locations %}
        <a href="#" class="cat-item">
          <i class="fas fa-map-marker-alt"></i>
          {% trans location.name %}
        </a>
      {% endfor %}

      <!-- STATIC CATEGORIES (AUTO TRANSLATE) -->
      <a href="#" class="cat-item"><i class="fas fa-globe-asia"></i> {% trans "World" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-coins"></i> {% trans "Trade" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-heartbeat"></i> {% trans "Health" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-gavel"></i> {% trans "Law & Court" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-graduation-cap"></i> {% trans "Education" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-leaf"></i> {% trans "Climate" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-car"></i> {% trans "Transport" %}</a>
      <a href="#" class="cat-item"><i class="fas fa-microchip"></i> {% trans "Tech" %}</a>

    </div>

  </div>
</div>
