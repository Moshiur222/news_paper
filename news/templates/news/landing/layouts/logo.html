{% load static %}
<style>
.main-header {
  background: var(--header-bg);
  padding: 20px 0;
  border-bottom: 3px solid var(--primary-red);
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-dark) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(194, 43, 43, 0.3);
}

.logo-icon i {
  font-size: 32px;
  color: white;
}

.logo-text h1 {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--primary-red);
  letter-spacing: -0.5px;
  margin-bottom: 0;
  line-height: 1.2;
}

.logo-text p {
  font-size: 0.65rem;
  letter-spacing: 1px;
  color: #4b5563;
  text-transform: uppercase;
  margin-bottom: 0;
}

@media (max-width: 768px) {
  .logo-icon { width: 45px; height: 45px; }
  .logo-icon i { font-size: 24px; }
  .logo-text h1 { font-size: 1.6rem; }
}
</style>

<div class="main-header">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6 text-md-start text-center logo-area">
        <div class="logo-text">
          <img src="{% static 'news/images/logo.png' %}" alt="Ad Banner" class="img-fluid rounded" style="max-height:60px;">
        </div>
      </div>
    </div>
  </div>
</div>
