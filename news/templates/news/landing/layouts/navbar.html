{% extends "news/landing/base/base.html" %}

<!-- AD -->
{% block ad %}
<div class="container-xl">
  <div class="ad-leaderboard" style="height:80px;line-height:60px;">Advertisement — 728 × 90</div>
</div>
{% endblock ad %}
<!-- ══════════ MAIN NAV ══════════ -->
{% block navber %}
<nav class="main-nav navbar navbar-expand-lg">
  <div class="container-xl">
    <a class="navbar-brand serif" href="#">
      <span data-bn>দৈনিক সংবাদ</span><span data-en>Daily Sangbad</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto" id="navLinks"></ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
        <button class="nav-search-btn" onclick="toggleSearch()">
          <i class="bi bi-search me-1"></i><span data-bn>অনুসন্ধান</span><span data-en>Search</span>
        </button>
      </div>
    </div>
  </div>
</nav>
{% endblock navber %}

<!-- ══════════ CAT STRIP ══════════ -->
{% block cat_strip %}
<div class="cat-strip">
  <div class="container-xl px-0 px-md-3" id="catStrip"></div>
</div>
{% endblock cat_strip %}
